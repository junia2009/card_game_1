<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solitaire - Klondike</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="three-container"></div>
  <div id="guide-box">
    <b>ソリティア（クロンダイク）遊び方</b><br>
    <ul style="margin:4px 0 0 16px;padding:0;font-size:0.95em;">
      <li>カードをクリックで選択→移動先をクリック</li>
      <li>カードは赤黒交互・数字が1つ小さい列にのみ移動可</li>
      <li>エースから順に同じマークで組札（上部）に積む</li>
      <li>山札クリックで1枚めくり、捨て札からも移動可</li>
      <li>全カードを組札に移せばクリア！</li>
    </ul>
  </div>
  <div id="version-label">Game:1.0.4</div>
  <script type="module" src="main.js"></script>
</body>
</html>
